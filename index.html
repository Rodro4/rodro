<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rodro</title>
    <style>
        /* Estado inicial oscuro */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

        /* Clase para el efecto flash */
        .flash {
            background-color: #fff !important;
            color: #000 !important;
        }

        h1 { font-size: 3rem; }
    </style>
</head>
<body>

    <h1>flashbang</h1>

    <script>
        // Cambia a blanco tras 2 segundos (2000ms) de forma brusca
        setTimeout(() => {
            document.body.classList.add('flash');
        }, 2000);
    </script>

</body>
</html>
